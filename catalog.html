<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection — Sora Parfum</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

<script src="js/navbar.js"></script>

<!-- ===== CATALOG ===== -->
<section class="catalog-section">
  <div class="section-header">
    <h2 class="section-title"><span data-i18n="allCollection">Toute la</span> <em>Collection</em></h2>
    <div class="filters">
      <button class="filter-btn active" data-filter="Tous">Tous</button>
      <button class="filter-btn" data-filter="Oriental">Oriental</button>
      <button class="filter-btn" data-filter="Floral">Floral</button>
      <button class="filter-btn" data-filter="Boisé">Boisé</button>
      <button class="filter-btn" data-filter="Frais">Frais</button>
    </div>
  </div>
  <div class="products-grid" id="products-grid"></div>
  <div id="no-results" style="display:none" class="no-results"></div>
</section>

<!-- ===== FOOTER ===== -->
<footer>
  <div class="footer-logo">Sora Parfum</div>
  <p>© 2026 Sora Parfum. <span data-i18n="rights">Tous droits réservés.</span></p>
  <p><i data-lucide="lock"></i> Paiement 100% sécurisé</p>
</footer>

<script src="js/products.js"></script>
<script src="js/shared.js"></script>
<script src="js/cart.js"></script>
<script>
  let currentFilter = 'Tous';

  function getTagColor(tag) {
    const colors = { 'Bestseller': '#f59e0b', 'Nouveau': '#10b981', 'Premium': '#c084fc', 'Exclusif': '#f43f5e' };
    return colors[tag] || '#6b7280';
  }

  function renderProducts(filter = 'Tous', searchQuery = '') {
    const grid = document.getElementById('products-grid');
    const noResults = document.getElementById('no-results');
    let filtered = filter === 'Tous' ? products : products.filter(p => p.scent === filter);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(p =>
        p.name.toLowerCase().includes(q) ||
        p.brand.toLowerCase().includes(q) ||
        p.notes.toLowerCase().includes(q) ||
        p.scent.toLowerCase().includes(q)
      );
    }

    if (filtered.length === 0) {
      grid.innerHTML = '';
      noResults.style.display = 'block';
      noResults.innerHTML = `Aucun résultat pour "<strong>${searchQuery || filter}</strong>"`;
      lucide.createIcons();
      return;
    }

    noResults.style.display = 'none';
    grid.innerHTML = filtered.map(p => `
      <div class="product-card" onclick="window.location.href='product.html?id=${p.id}'">
        ${p.tag ? `<div class="product-tag" style="background:${getTagColor(p.tag)}">${p.tag}</div>` : ''}
        <div class="product-visual" style="background: radial-gradient(circle at 40% 40%, ${p.color}30, ${p.color}05)">
          ${p.image
            ? `<img class="product-img" src="${p.image}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="product-emoji" style="display:none">${p.emoji}</div>`
            : `<div class="product-emoji">${p.emoji}</div>`}
          <div class="product-glow" style="background:${p.color}"></div>
        </div>
        <div class="product-info">
          <span class="product-brand">${p.brand}</span>
          <h3 class="product-name">${p.name}</h3>
          <div class="product-meta">
            <span class="scent-badge">${p.scent}</span>
            <span class="product-ml">${p.ml}</span>
          </div>
          <p class="product-notes">${p.notes}</p>
          <div class="product-footer">
            <span class="product-price">€${p.price}</span>
            <button class="add-btn" onclick="event.stopPropagation(); addToCart(${p.id})">
              <i data-lucide="plus"></i> Ajouter
            </button>
          </div>
        </div>
      </div>
    `).join('');
    lucide.createIcons();
  }

  function handleSearch(input) {
    const q = input.value.trim();
    // sync both inputs
    const other = input.id === 'search-input' ? document.getElementById('search-input-mobile') : document.getElementById('search-input');
    if (other) other.value = input.value;
    renderProducts(currentFilter, q);
  }

  document.addEventListener('DOMContentLoaded', () => {
    // Read URL query param
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q') || '';
    if (q) {
      const si = document.getElementById('search-input');
      const sm = document.getElementById('search-input-mobile');
      if (si) si.value = q;
      if (sm) sm.value = q;
    }
    renderProducts(currentFilter, q);

    // Wire filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
        const searchVal = document.getElementById('search-input')?.value || '';
        renderProducts(currentFilter, searchVal);
      });
    });

    // Wire desktop search on catalog page directly
    const si = document.getElementById('search-input');
    if (si) si.addEventListener('input', e => handleSearch(e.target));
    const sm = document.getElementById('search-input-mobile');
    if (sm) sm.addEventListener('input', e => handleSearch(e.target));
  });
</script>
</body>
</html>
